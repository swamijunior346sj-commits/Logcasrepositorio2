<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.7",
      "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
      "jspdf": "https://esm.sh/jspdf@^4.1.0",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.39.7"
    }
  }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>LogCash - Inteligência em Entregas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-gold": "#EBC051",
            "bright-gold": "#F9E29C",
            "deep-gold": "#AA771C",
            "dark-gold": "#B88F35",
            "pitch-black": "#000000",
            "pure-black": "#000000",
            "charcoal-field": "#121212",
            "card-dark": "#121210",
            "divider-gray": "#2A2A26",
            "secondary-gray": "#7A7A7A",
            "white-text": "#F5F5F5",
          },
          fontFamily: {
            "sans": ["Plus Jakarta Sans", "sans-serif"],
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "2xl": "1rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    .font-game {
      font-family: 'Rajdhani', sans-serif;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    .pb-safe {
      padding-bottom: var(--sab);
    }

    .pt-safe {
      padding-top: var(--sat);
    }

    /* Animações de Impacto e Brilho (Gamificação Avançada) */
    @keyframes pop-burst {
      0% {
        transform: scale(0.4) translateY(40px);
        opacity: 0;
        filter: blur(20px);
      }

      60% {
        transform: scale(1.15) translateY(-15px);
        filter: blur(0px);
      }

      80% {
        transform: scale(0.9);
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes pop-minimize {
      0% {
        transform: scale(1) translateY(0);
        opacity: 1;
        filter: blur(0px);
      }

      100% {
        transform: scale(0.2) translateY(60px);
        opacity: 0;
        filter: blur(20px);
      }
    }

    @keyframes impact-shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-4px) rotate(-1deg);
      }

      75% {
        transform: translateX(4px) rotate(1deg);
      }
    }

    @keyframes float-bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes shine-sweep {
      0% {
        transform: translateX(-200%) skewX(-30deg);
        opacity: 0;
      }

      50% {
        opacity: 0.8;
      }

      100% {
        transform: translateX(200%) skewX(-30deg);
        opacity: 0;
      }
    }

    @keyframes ring-pulse {
      0% {
        transform: scale(0.7);
        opacity: 1;
        border-width: 6px;
      }

      100% {
        transform: scale(1.8);
        opacity: 0;
        border-width: 1px;
      }
    }

    @keyframes timer-shrink {
      0% {
        width: 100%;
      }

      100% {
        width: 0%;
      }
    }

    .animate-pop-burst {
      animation: pop-burst 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .animate-pop-minimize {
      animation: pop-minimize 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .animate-impact {
      animation: impact-shake 0.2s ease-in-out;
    }

    .animate-float-bounce {
      animation: float-bounce 2.2s ease-in-out infinite;
    }

    .animate-ring-pulse {
      animation: ring-pulse 1.8s cubic-bezier(0.24, 0, 0.38, 1) infinite;
    }

    .animate-timer {
      animation: timer-shrink 2.2s linear forwards;
    }

    .shine-container {
      position: relative;
      overflow: hidden;
    }

    .shine-overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
      pointer-events: none;
      animation: shine-sweep 2s infinite;
    }

    .glass-deep {
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(60px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.8);
    }

    .btn-confirm-impact:active {
      transform: scale(0.92);
      filter: brightness(1.2);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
